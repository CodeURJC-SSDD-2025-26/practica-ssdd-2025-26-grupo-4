# 1. NOMBRE DE LA APLICACIÓN
spring.application.name=backend

# 2. CONFIGURACIÓN DEL PUERTO Y HTTPS (Requisito Práctica 2)
server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=tu_contraseña_del_paso_anterior
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=proyectocine

# 3. CONFIGURACIÓN DE LA BASE DE DATOS (MySQL)
# Sustituye 'nombre_tu_bd' por el nombre que hayas puesto en MySQL Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/nombre_tu_bd?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=tu_contraseña_de_mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. CONFIGURACIÓN DE JPA / HIBERNATE
# 'update' crea las tablas automáticamente basándose en tus clases Java @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 5. CONFIGURACIÓN DE MUSTACHE (Para que reconozca tus HTML)
spring.mustache.prefix=classpath:/templates/
spring.mustache.suffix=.html
spring.mustache.cache=false