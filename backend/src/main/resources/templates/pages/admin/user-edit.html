<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PCBuilderShop - Editar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="../../css/style.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body>
    <div id="navbar-placeholder">
    </div>
    <main class="container my-5 pt-4">
        <!-- Navigation of Administration -->
        <nav class="nav nav-pills mb-4">
            <a class="nav-link" href="admin-dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <a class="nav-link" href="item-list.html"><i class="bi bi-box-seam me-1"></i>Productos</a>
            <a class="nav-link active" href="user-list.html"><i class="bi bi-people me-1"></i>Usuarios</a>
            <a class="nav-link" href="review-list.html"><i class="bi bi-chat-left-text me-1"></i>Reseñas</a>
            <a class="nav-link" href="order-list.html"><i class="bi bi-cart-check me-1"></i>Pedidos</a>
        </nav>
        <!-- Title and Main Action -->
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1"><i class="bi bi-pencil-square me-2"></i>Editar Usuario</h2>
                <p class="text-muted mb-0 small">Actualizando perfil de <strong>John Dominguez Encinas</strong></p>
            </div>
            <span class="badge bg-secondary">ID: #U001</span>
        </header>
        <section class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form action="#" id="userForm" method="POST">
                            <!-- Current profile photo -->
                            <div class="text-center mb-4">
                                <div class="position-relative d-inline-block shadow-sm rounded-circle p-1 bg-white">
                                    <img class="rounded-circle" id="avatar"
                                        src="../../assets/images/profile_photo_example.jpeg"
                                        style="width:110px;height:110px;object-fit:cover;" />
                                    <label
                                        class="btn btn-primary btn-sm rounded-circle position-absolute bottom-0 end-0 p-2 border-white border-2"
                                        for="imgInput" style="width:34px;height:34px;">
                                        <i class="bi bi-camera shadow"></i>
                                    </label>
                                </div>
                                <input accept="image/*" class="d-none" id="imgInput" type="file" />
                            </div>
                            <!-- Name -->
                            <div class="mb-3">
                                <label class="form-label fw-bold" for="nombre">Nombre completo</label>
                                <input class="form-control" id="nombre" name="nombre" required="" type="text"
                                    value="John Dominguez Encinas" />
                            </div>
                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label fw-bold" for="email">Correo electrónico</label>
                                <input class="form-control" id="email" name="email" required="" type="email"
                                    value="john.doe@email.com" />
                            </div>
                            <!-- Password -->
                            <div class="mb-3">
                                <label class="form-label fw-bold" for="contrasena">Nueva contraseña</label>
                                <input class="form-control" id="contrasena" name="contrasena"
                                    placeholder="Dejar vacío para no cambiar" type="password" />
                                <div class="form-text">Solo rellenar si deseas cambiar la contraseña actual.</div>
                            </div>
                            <!-- Role (New for editing) -->
                            <div class="mb-3 border-top pt-3">
                                <label class="form-label fw-bold" for="rol">Rol de Acceso</label>
                                <select class="form-select" id="rol" name="rol" required="">
                                    <option>Cliente</option>
                                    <option>Administrador</option>
                                </select>
                                <div class="form-text text-danger small">
                                    <i class="bi bi-exclamation-triangle me-1"></i>Cambiar a administrador otorga acceso
                                    total al panel.
                                </div>
                            </div>
                            <div class="mt-4 pt-4 border-top d-flex gap-2">
                                <button class="btn btn-primary px-4 shadow-sm" type="submit">
                                    <i class="bi bi-save me-2"></i>Guardar Cambios
                                </button>
                                <a class="btn btn-outline-secondary px-4" href="user-list.html">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script to simulate saving and redirection -->
    <script>
        // --- VIEW MODE (read-only) ---
        const params = new URLSearchParams(window.location.search);
        const isViewMode = params.get('mode') === 'view';

        if (isViewMode) {
            // Change title and subtitle
            document.querySelector('h2').innerHTML = '<i class="bi bi-person-lines-fill me-2"></i>Detalle de Usuario';
            document.querySelector('header p').innerHTML =
                'Visualizando perfil de <strong>John Dominguez Encinas</strong>';

            // Disable all form fields
            document.querySelectorAll('#userForm input, #userForm select, #userForm textarea').forEach(el => {
                el.disabled = true;
            });

            // Hide camera button to change avatar
            document.querySelector('label[for="imgInput"]').style.display = 'none';

            // Hide save button and change "Cancel" to "Back"
            document.querySelector('#userForm button[type="submit"]').style.display = 'none';
            const cancelBtn = document.querySelector('#userForm a.btn-outline-secondary');
            cancelBtn.textContent = 'Volver al listado';
            cancelBtn.classList.replace('btn-outline-secondary', 'btn-secondary');

            // Hide password and role warning notes
            document.querySelectorAll('#userForm .form-text').forEach(el => el.style.display = 'none');
        }

        // Avatar Update
        document.getElementById('imgInput').addEventListener('change', e => {
            const f = e.target.files[0];
            if (f) {
                const r = new FileReader();
                r.onload = ev => {
                    document.getElementById('avatar').src = ev.target.result;
                };
                r.readAsDataURL(f);
            }
        });

        // --- 2. MOCK SUBMIT EVENT MANAGEMENT ---
        // Abort standard form submission simulating success by redirecting to user-list.html
        document.getElementById('userForm').onsubmit = e => {
            e.preventDefault();
            location.href = 'user-list.html';
        };


        // Component Loading
        const loadComp = (url, id, cb) => {
            fetch(url)
                .then(r => r.text())
                .then(h => {
                    document.getElementById(id).innerHTML = h;
                    if (cb) cb(document.getElementById(id));
                });
        };

        // Load header based on stored session state
        loadComp(localStorage.getItem('isLoggedIn') ? '../headers/loged_header.html' : '../headers/unloged_header.html', 'navbar-placeholder', nav => {
            nav.querySelectorAll('a, form').forEach(el => {
                const a = el.tagName === 'FORM' ? 'action' : 'href';
                const v = el.getAttribute(a);
                if (v?.startsWith('../') && !v.startsWith('http')) {
                    el.setAttribute(a, '../' + v);
                }
            });
            const b = document.getElementById('btnAdminPanel');
            if (b) {
                b.href = 'admin-dashboard.html';
                b.classList.remove('d-none');
            }
        });

        loadComp('../footer.html', 'footer-placeholder');
    </script>
</body>

</html>
