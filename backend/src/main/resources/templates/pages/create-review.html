<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCBuilderShop</title>
    <link rel="icon" type="image/x-icon" href="../assets/icons/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

</head>

<body>
    {{#isLoggedIn}}
    {{> partials/headers/loged_header}}
    {{/isLoggedIn}}
    
    {{^isLoggedIn}}
        {{> partials/headers/unloged_header}}
    {{/isLoggedIn}}

    <main class="container" style="margin-top: 100px; min-height: 80vh;">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/" class="text-decoration-none">Inicio</a></li>
                        <li class="breadcrumb-item"><a href="search-result"
                                class="text-decoration-none">Procesadores</a></li>
                        <li class="breadcrumb-item active">Escribir opinión</li>
                    </ol>
                </nav>

                <h2 class="fw-bold mb-4">Cuéntanos tu experiencia</h2>

                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0" style="top: 100px;">
                            <img src="../assets/images/amd-ryzen-7-9800x3d/amd-ryzen-7-9800x3d-main.jpg"
                                class="card-img-top p-4" alt="Producto">
                            <div class="card-body text-center border-top">
                                <h6 class="fw-bold mb-1">AMD Ryzen 7 9800X3D</h6>
                                <p class="text-primary fw-bold mb-0">464,95€</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <div class="card shadow-sm border-0 p-4">
                            <form action="#" method="POST">
                                <div class="mb-4">
                                    <label class="form-label fw-bold d-block">¿Qué puntuación le das?</label>
                                    <div id="star-container" class="text-warning fs-3">
                                        <i class="bi bi-star star-btn" data-value="1" style="cursor:pointer;"></i>
                                        <i class="bi bi-star star-btn" data-value="2" style="cursor:pointer;"></i>
                                        <i class="bi bi-star star-btn" data-value="3" style="cursor:pointer;"></i>
                                        <i class="bi bi-star star-btn" data-value="4" style="cursor:pointer;"></i>
                                        <i class="bi bi-star star-btn" data-value="5" style="cursor:pointer;"></i>
                                    </div>
                                    <input type="hidden" name="rating" id="rating-value" value="0">
                                    <small class="text-muted">Haz clic para puntuar</small>
                                </div>

                                <div class="mb-3">
                                    <label for="titulo" class="form-label fw-bold">Título de tu opinión</label>
                                    <input type="text" class="form-control form-control-lg" id="titulo"
                                        placeholder="Ej: Increíble rendimiento para gaming">
                                </div>

                                <div class="mb-4">
                                    <label for="comentario" class="form-label fw-bold">Tu comentario</label>
                                    <textarea class="form-control" id="comentario" rows="6"
                                        placeholder="Cuéntanos qué te ha parecido el producto, su instalación, temperaturas..."></textarea>
                                </div>

                                <div class="row mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold text-success"><i
                                                class="bi bi-plus-circle me-1"></i> Pros</label>
                                        <input type="text" class="form-control mb-2" placeholder="Ej: Muy potente">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold text-danger"><i
                                                class="bi bi-dash-circle me-1"></i> Contras</label>
                                        <input type="text" class="form-control mb-2" placeholder="Ej: Precio elevado">
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-bold">Añadir fotos a tu opinión</label>
                                    <div class="d-flex flex-wrap gap-2 mb-2" id="preview-container">
                                    </div>
                                    <label for="upload-photo" class="btn btn-outline-primary btn-sm">
                                        <i class="bi bi-camera me-1"></i> Seleccionar imágenes
                                    </label>
                                    <input type="file" id="upload-photo" multiple accept="image/*"
                                        style="display: none;">
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary px-4 py-2 fw-bold">
                                        Publicar opinión
                                    </button>
                                    <a href="item-detail" class="btn btn-outline-secondary px-4 py-2">
                                        Cancelar
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    {{> partials/footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const stars = document.querySelectorAll('.star-btn');
        const ratingInput = document.getElementById('rating-value');

        stars.forEach(star => {
            star.addEventListener('click', function () {
                const value = this.getAttribute('data-value');
                ratingInput.value = value; // Store value on hidden input

                // Update stars
                stars.forEach(s => {
                    if (s.getAttribute('data-value') <= value) {
                        s.classList.replace('bi-star', 'bi-star-fill');
                    } else {
                        s.classList.replace('bi-star-fill', 'bi-star');
                    }
                });
            });
        });
    </script>

    <script>
        const photoInput = document.getElementById('upload-photo');
        const previewContainer = document.getElementById('preview-container');

        photoInput.addEventListener('change', function () {
            // We don't delete the previous ones in case the user adds more
            const files = Array.from(this.files);

            files.forEach(file => {
                const reader = new FileReader();

                reader.onload = function (e) {
                    // Create the image element
                    const imgWrapper = document.createElement('div');
                    imgWrapper.style.position = 'relative';

                    imgWrapper.innerHTML = `
                <img src="${e.target.result}" class="img-thumbnail" style="width: 80px; height: 80px; object-fit: cover;">
                <span class="badge bg-danger position-absolute top-0 end-0 rounded-circle" 
                      style="cursor:pointer; transform: translate(30%, -30%);" 
                      onclick="this.parentElement.remove()">×</span>
            `;
                    previewContainer.appendChild(imgWrapper);
                }

                reader.readAsDataURL(file);
            });
        });
    </script>

    <script>
        function changeImage(src) {
            // Find the main image by ID and change its source
            document.getElementById('mainImage').src = src;
        }
    </script>

    <script>
        document.querySelector('form').addEventListener('submit', function (event) {
            // Get current values
            const rating = document.getElementById('rating-value').value;
            const titulo = document.getElementById('titulo').value.trim();
            const comentario = document.getElementById('comentario').value.trim();

            // Check if something is missing
            if (rating === "0") {
                alert("Por favor, selecciona una puntuación con las estrellas.");
                event.preventDefault(); // Prevent form submission
                return;
            }

            if (titulo === "") {
                alert("El título de la opinión no puede estar vacío.");
                event.preventDefault();
                return;
            }

            if (comentario.length < 15) {
                alert("Tu comentario es demasiado corto. Cuéntanos un poco más sobre tu experiencia.");
                event.preventDefault();
                return;
            }

            // If everything is fine, show a success message
            alert("¡Gracias! Tu opinión se ha publicado correctamente.");
        });
    </script>

    <script>
        // --- HEADER LOADING (Current code) ---
        document.addEventListener("DOMContentLoaded", function () {
            // Check if user is logged in
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const isInPagesFolder = window.location.pathname.includes('/pages/');
            const basePath = isInPagesFolder ? 'headers/' : 'pages/headers/';
            const headerFile = isLoggedIn ? basePath + 'loged_header.html' : basePath + 'unloged_header.html';

            // Load the file and insert it in the container
            fetch(headerFile)
                .then(response => {
                    if (!response.ok) throw new Error("Could not load header");
                    return response.text();
                })
                .then(html => {
                    document.getElementById('header-container').innerHTML = html;

                    if (localStorage.getItem('userRole') === 'admin') {
                        const adminBtn = document.getElementById('btnAdminPanel');
                        if (adminBtn) adminBtn.classList.remove('d-none');
                    }

                    // Logout logic
                    const btnSalir = document.getElementById('btnCerrarSesion');
                    if (btnSalir) {
                        btnSalir.addEventListener('click', function (e) {
                            e.preventDefault();
                            localStorage.removeItem('isLoggedIn');
                            localStorage.removeItem('userRole'); // Also clean up the role
                            window.location.href = isInPagesFolder ? '/' : '/';
                        });
                    }

                    // Fix link paths if we are in the index
                    if (!isInPagesFolder) {
                        const links = document.querySelectorAll('#header-container a');
                        links.forEach(link => {
                            const href = link.getAttribute('href');
                            // If the link is not an external link (http) and does not start with "pages/"
                            if (href && !href.startsWith('http') && !href.startsWith('pages/') && href !== '#') {
                                link.setAttribute('href', 'pages/' + href);
                            }
                        });
                    }

                    // --- BONUS: ADD LOGOUT FUNCTION ---
                    // If we load the loged_header, we give life to the Logout button (if you add it)
                    if (isLoggedIn) {
                        const btnSalir = document.getElementById('btnCerrarSesion');
                        if (btnSalir) {
                            btnSalir.addEventListener('click', function () {
                                localStorage.removeItem('isLoggedIn');
                                window.location.reload(); // Reload the page
                            });
                        }
                    }
                })
                .catch(error => console.error('Error loading header:', error));
        });
        fetch('footer.html')
            .then(response => {
                if (!response.ok) throw new Error("Error loading footer");
                return response.text();
            })
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(error => console.error("Error en footer:", error));
    </script>
</body>

</html>
