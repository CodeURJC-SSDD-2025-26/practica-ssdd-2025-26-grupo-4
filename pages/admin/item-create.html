<!--
Archivo: item-create.html
Descripción: Formulario de creación de un nuevo producto para el administrador.
Cubre rúbrica: formulario crear entidad, campos obligatorios, imagen con galería, uso correcto Bootstrap.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PCBuilderShop - Crear Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="../../css/style.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body>
    <div id="navbar-placeholder"></div>
    <main class="container my-5 pt-4">
        <!-- Navegación de Administración -->
        <nav class="nav nav-pills mb-4">
            <a class="nav-link" href="admin-dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <a class="nav-link active" href="item-list.html"><i class="bi bi-box-seam me-1"></i>Productos</a>
            <a class="nav-link" href="user-list.html"><i class="bi bi-people me-1"></i>Usuarios</a>
            <a class="nav-link" href="review-list.html"><i class="bi bi-chat-left-text me-1"></i>Reseñas</a>
            <a class="nav-link" href="order-list.html"><i class="bi bi-cart-check me-1"></i>Pedidos</a>
        </nav>
        <!-- Titulo y Acción Principal -->
        <header class="mb-4">
            <h2 class="mb-1"><i class="bi bi-plus-circle me-2"></i>Crear Nuevo Producto</h2>
            <p class="text-muted mb-0 small">Añade un nuevo artículo al catálogo con detalles técnicos, precio y stock.
            </p>
        </header>
        <!-- Formulario de Creación -->
        <section class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form action="#" id="createForm" method="POST">
                    <div class="row g-4">
                        <!-- Datos Principales -->
                        <div class="col-lg-8">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Nombre del Producto</label>
                                <input class="form-control" name="nombre" placeholder="Ej: Procesador Intel Core..."
                                    required="" type="text" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Descripción Detallada</label>
                                <textarea class="form-control" name="descripcion"
                                    placeholder="Especificaciones técnicas..." required="" rows="5"></textarea>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold">Categoría</label>
                                    <select class="form-select" name="categoria" required="">
                                        <option disabled="" selected="" value="">Elegir...</option>
                                        <option>Procesadores</option>
                                        <option>Gráficas</option>
                                        <option>Placas Base</option>
                                        <option>RAM</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold">Precio (€)</label>
                                    <div class="input-group">
                                        <input class="form-control" name="precio" placeholder="0.00" required=""
                                            step="0.01" type="number" />
                                        <span class="input-group-text">€</span>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold">Stock Inicial</label>
                                    <input class="form-control" name="stock" placeholder="0" required=""
                                        type="number" />
                                </div>
                            </div>
                        </div>
                        <!-- Panel Multimedia -->
                        <div class="col-lg-4">
                            <div class="card bg-light border-0">
                                <div class="card-body">
                                    <label class="form-label small fw-bold">Imágenes del Producto</label>
                                    <input accept="image/*" class="form-control form-control-sm" id="imgInput"
                                        multiple="" required="" type="file" />
                                    <p class="text-muted x-small mt-2 mb-0"><i
                                            class="bi bi-info-circle me-1"></i>Formatos: JPG, PNG, WEBP. Máximo 4MB cada
                                        una.</p>
                                    <div class="d-flex flex-wrap gap-2 mt-3" id="preview"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-top d-flex gap-2">
                        <button class="btn btn-primary px-4 shadow-sm" type="submit"><i
                                class="bi bi-cloud-upload me-2"></i>Publicar Producto</button>
                        <a class="btn btn-outline-secondary px-4" href="item-list.html">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Manejo de Previsualización
        document.getElementById('imgInput').addEventListener('change', e => {
            const preview = document.getElementById('preview');
            preview.innerHTML = '';
            [...e.target.files].forEach(file => {
                const reader = new FileReader();
                reader.onload = r => {
                    const div = document.createElement('div');
                    div.className = 'position-relative';
                    div.innerHTML = `<img src="${r.target.result}" class="img-thumbnail" style="width:80px;height:80px;object-fit:cover;">
                                     <button type="button" class="btn-close position-absolute top-0 end-0 bg-white" onclick="this.parentElement.remove()"></button>`;
                    preview.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        });

        // Simulación de Envío
        document.getElementById('createForm').onsubmit = e => { e.preventDefault(); location.href = 'item-list.html'; };

        // Carga de Componentes
        const loadComp = (url, id, cb) => {
            fetch(url)
                .then(r => r.text())
                .then(h => {
                    document.getElementById(id).innerHTML = h;
                    if (cb) cb(document.getElementById(id));
                });
        };

        // Carga del Header dependiendo del estado de sesión almacenado
        loadComp(localStorage.getItem('isLoggedIn') ? '../headers/loged_header.html' : '../headers/unloged_header.html', 'navbar-placeholder', nav => {
            nav.querySelectorAll('a, form').forEach(el => {
                const a = el.tagName === 'FORM' ? 'action' : 'href';
                const v = el.getAttribute(a);
                if (v?.startsWith('../') && !v.startsWith('http')) {
                    el.setAttribute(a, '../' + v);
                }
            });
            const b = document.getElementById('btnAdminPanel');
            if (b) {
                b.href = 'admin-dashboard.html';
                b.classList.remove('d-none');
            }
        });

        loadComp('../footer.html', 'footer-placeholder');
    </script>
</body>

</html>
