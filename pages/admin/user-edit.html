<!--
Archivo: user-edit.html
Descripción: Formulario de edición de un usuario existente para el administrador.
Cubre rúbrica: formulario editar entidad, campos pre-rellenados, imagen de perfil visible, uso correcto Bootstrap.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCBuilderShop - Editar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main class="container my-5 pt-4">
        <!-- Navegación de Administración -->
        <nav class="nav nav-pills mb-4">
            <a class="nav-link" href="admin-dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <a class="nav-link" href="item-list.html"><i class="bi bi-box-seam me-1"></i>Productos</a>
            <a class="nav-link active" href="user-list.html"><i class="bi bi-people me-1"></i>Usuarios</a>
            <a class="nav-link" href="review-list.html"><i class="bi bi-chat-left-text me-1"></i>Reseñas</a>
        </nav>

        <!-- Titulo y Acción Principal -->
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1"><i class="bi bi-pencil-square me-2"></i>Editar Usuario</h2>
                <p class="text-muted mb-0 small">Actualizando perfil de <strong>John Dominguez Encinas</strong></p>
            </div>
            <span class="badge bg-secondary">ID: #U001</span>
        </header>

        <section class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form id="userForm" action="#" method="POST">
                            <!-- Avatar de Perfil Actual -->
                            <div class="text-center mb-4">
                                <div class="position-relative d-inline-block shadow-sm rounded-circle p-1 bg-white">
                                    <img id="avatar" src="../../assets/images/profile_photo_example.jpeg"
                                        class="rounded-circle" style="width:110px;height:110px;object-fit:cover;">
                                    <label for="imgInput"
                                        class="btn btn-primary btn-sm rounded-circle position-absolute bottom-0 end-0 p-2 border-white border-2"
                                        style="width:34px;height:34px;"><i class="bi bi-camera shadow"></i></label>
                                </div>
                                <input type="file" id="imgInput" class="d-none" accept="image/*">
                            </div>

                            <!-- Nombre -->
                            <div class="mb-3">
                                <label for="nombre" class="form-label fw-bold">Nombre completo</label>
                                <input type="text" class="form-control" id="nombre" name="nombre"
                                    value="John Dominguez Encinas" required>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Correo electrónico</label>
                                <input type="email" class="form-control" id="email" name="email"
                                    value="john.doe@email.com" required>
                            </div>

                            <!-- Contraseña -->
                            <div class="mb-3">
                                <label for="contrasena" class="form-label fw-bold">Nueva contraseña</label>
                                <input type="password" class="form-control" id="contrasena" name="contrasena"
                                    placeholder="Dejar vacío para no cambiar">
                                <div class="form-text">Solo rellenar si deseas cambiar la contraseña actual.</div>
                            </div>

                            <div class="mt-4 pt-4 border-top d-flex gap-2">
                                <button type="submit" class="btn btn-primary px-4 shadow-sm"><i
                                        class="bi bi-save me-2"></i>Guardar Cambios</button>
                                <a href="user-list.html" class="btn btn-outline-secondary px-4">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script para simular guardado y redirección -->
    <script>
        // Actualización de Avatar
        document.getElementById('imgInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = r => document.getElementById('avatar').src = r.target.result;
                reader.readAsDataURL(file);
            }
        });

        // Simulación de Envío
        document.getElementById('userForm').onsubmit = e => { e.preventDefault(); location.href = 'user-list.html'; };

        // Carga de Componentes
        const loadComp = (url, id, cb) => fetch(url).then(r => r.text()).then(h => {
            document.getElementById(id).innerHTML = h;
            if (cb) cb(document.getElementById(id));
        });
        loadComp(localStorage.getItem('isLoggedIn') ? '../headers/loged_header.html' : '../headers/unloged_header.html', 'navbar-placeholder', (nav) => {
            nav.querySelectorAll('a, form').forEach(el => {
                const attr = el.tagName === 'FORM' ? 'action' : 'href';
                const val = el.getAttribute(attr);
                if (val?.startsWith('../') && !val.startsWith('http')) el.setAttribute(attr, '../' + val);
            });
            const btn = document.getElementById('btnAdminPanel');
            if (btn) { btn.href = 'admin-dashboard.html'; btn.classList.remove('d-none'); }
        });
        loadComp('../footer.html', 'footer-placeholder');
    </script>
</body>

</html>
