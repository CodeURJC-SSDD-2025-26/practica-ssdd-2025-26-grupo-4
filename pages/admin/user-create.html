<!--
Archivo: user-create.html
Descripción: Formulario de creación de un nuevo usuario para el administrador.
Cubre rúbrica: formulario crear entidad, campos obligatorios, imagen de perfil, uso correcto Bootstrap.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCBuilderShop - Crear Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main class="container my-5 pt-4">
        <!-- Navegación de Administración -->
        <nav class="nav nav-pills mb-4">
            <a class="nav-link" href="admin-dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <a class="nav-link" href="item-list.html"><i class="bi bi-box-seam me-1"></i>Productos</a>
            <a class="nav-link active" href="user-list.html"><i class="bi bi-people me-1"></i>Usuarios</a>
            <a class="nav-link" href="review-list.html"><i class="bi bi-chat-left-text me-1"></i>Reseñas</a>
        </nav>

        <!-- Titulo y Acción Principal -->
        <header class="mb-4">
            <h2 class="mb-1"><i class="bi bi-person-plus me-2"></i>Crear Nuevo Usuario</h2>
            <p class="text-muted mb-0 small">Registra una nueva cuenta.</p>
        </header>

        <section class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form id="userForm" action="#" method="POST">
                            <!-- Avatar de Perfil -->
                            <div class="text-center mb-4">
                                <div class="position-relative d-inline-block shadow-sm rounded-circle p-1 bg-white">
                                    <img id="avatar" src="https://placehold.co/120x120/e9ecef/6c757d?text=?"
                                        class="rounded-circle" style="width:110px;height:110px;object-fit:cover;">
                                    <label for="imgInput"
                                        class="btn btn-primary btn-sm rounded-circle position-absolute bottom-0 end-0 p-2 border-white border-2"
                                        style="width:34px;height:34px;"><i class="bi bi-camera shadow"></i></label>
                                </div>
                                <input type="file" id="imgInput" class="d-none" accept="image/*" required>
                                <p class="text-muted x-small mt-2">Formatos aceptados: JPG o PNG</p>
                            </div>

                            <!-- Campos de Registro -->
                            <div class="row g-3">
                                <div class="col-12"><label class="form-label small fw-bold">Nombre
                                        Completo</label><input type="text" class="form-control"
                                        placeholder="Ej: Maria Lopez" required></div>
                                <div class="col-12"><label class="form-label small fw-bold">Email</label><input
                                        type="email" class="form-control" placeholder="usuario@email.com" required>
                                </div>
                                <div class="col-md-6"><label class="form-label small fw-bold">Contraseña</label><input
                                        type="password" class="form-control" placeholder="••••••••" required></div>
                                <div class="col-md-6"><label class="form-label small fw-bold">Rol de Acceso</label>
                                    <select class="form-select" required>
                                        <option value="" disabled selected>Elegir...</option>
                                        <option>Administrador</option>
                                        <option>Cliente</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mt-4 pt-4 border-top d-flex gap-2">
                                <button type="submit" class="btn btn-primary px-4 shadow-sm"><i
                                        class="bi bi-person-check me-2"></i>Registrar Usuario</button>
                                <a href="user-list.html" class="btn btn-outline-secondary px-4">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Previsualización de Avatar
        document.getElementById('imgInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = r => document.getElementById('avatar').src = r.target.result;
                reader.readAsDataURL(file);
            }
        });

        // Simulación de Envío
        document.getElementById('userForm').onsubmit = e => { e.preventDefault(); location.href = 'user-list.html'; };

        // Carga de Componentes
        const loadComp = (url, id, cb) => fetch(url).then(r => r.text()).then(h => {
            document.getElementById(id).innerHTML = h;
            if (cb) cb(document.getElementById(id));
        });
        loadComp(localStorage.getItem('isLoggedIn') ? '../headers/loged_header.html' : '../headers/unloged_header.html', 'navbar-placeholder', (nav) => {
            nav.querySelectorAll('a, form').forEach(el => {
                const attr = el.tagName === 'FORM' ? 'action' : 'href';
                const val = el.getAttribute(attr);
                if (val?.startsWith('../') && !val.startsWith('http')) el.setAttribute(attr, '../' + val);
            });
            const btn = document.getElementById('btnAdminPanel');
            if (btn) { btn.href = 'admin-dashboard.html'; btn.classList.remove('d-none'); }
        });
        loadComp('../footer.html', 'footer-placeholder');
    </script>
</body>

</html>
