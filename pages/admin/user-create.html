<!--
Archivo: user-create.html
Descripción: Formulario de creación de un nuevo usuario (siempre con rol cliente).
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PCBuilderShop - Crear Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="../../css/style.css" rel="stylesheet" />
</head>

<body>
    <div id="navbar-placeholder"></div>
    <main class="container my-5 pt-4">
        <!-- Navegación -->
        <nav class="nav nav-pills mb-4">
            <a class="nav-link" href="admin-dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <a class="nav-link" href="item-list.html"><i class="bi bi-box-seam me-1"></i>Productos</a>
            <a class="nav-link active" href="user-list.html"><i class="bi bi-people me-1"></i>Usuarios</a>
            <a class="nav-link" href="review-list.html"><i class="bi bi-chat-left-text me-1"></i>Reseñas</a>
            <a class="nav-link" href="order-list.html"><i class="bi bi-cart-check me-1"></i>Pedidos</a>
        </nav>
        <!-- Titulo y Acción Principal -->
        <header class="mb-4">
            <h2 class="mb-1"><i class="bi bi-person-plus me-2"></i>Crear Nuevo Usuario</h2>
            <p class="text-muted mb-0 small">Registra una nueva cuenta.</p>
        </header>
        <section class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form id="userForm">
                            <!-- 1. Sección de Avatar con Previsualización Directa -->
                            <!-- Campo oculto subyacente interactuado por un Label simulado estilo botón adjunto -->
                            <div class="text-center mb-4">
                                <div class="position-relative d-inline-block shadow-sm rounded-circle p-1 bg-white">
                                    <img class="rounded-circle" id="avatar"
                                        src="https://placehold.co/120x120/e9ecef/6c757d?text=?"
                                        style="width:110px;height:110px;object-fit:cover" />
                                    <label
                                        class="btn btn-primary btn-sm rounded-circle position-absolute bottom-0 end-0 p-2 border-white border-2"
                                        for="imgInput" style="width:34px;height:34px">
                                        <i class="bi bi-camera shadow"></i>
                                    </label>
                                </div>
                                <input accept="image/*" class="d-none" id="imgInput" required="" type="file" />
                                <p class="text-muted x-small mt-2">Formatos: JPG o PNG</p>
                            </div>
                            <!-- 2. Campos de Datos Escritos -->
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label small fw-bold">NombreCompleto</label>
                                    <input class="form-control" placeholder="Ej: Maria Lopez" required="" type="text" />
                                </div>
                                <div class="col-12">
                                    <label class="form-label small fw-bold">Email</label>
                                    <input class="form-control" placeholder="usuario@email.com" required=""
                                        type="email" />
                                </div>
                                <div class="col-12">
                                    <label class="form-label small fw-bold">Contraseña</label>
                                    <input class="form-control" placeholder="••••••••" required="" type="password" />
                                </div>
                            </div>
                            <div class="mt-4 pt-4 border-top d-flex gap-2">
                                <button class="btn btn-primary px-4 shadow-sm" type="submit">
                                    <i class="bi bi-person-check me-2"></i>Registrar Usuario
                                </button>
                                <a class="btn btn-outline-secondary px-4" href="user-list.html">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // --- 1. FLUJO DE PREVISUALIZACIÓN DE IMAGEN LOCAL ---
        // Lee el Blob local introducido en el input:file oculto y recarga el 'src' del id=avatar temporalmente
        document.getElementById('imgInput').addEventListener('change', e => {
            const f = e.target.files[0];
            if (f) {
                const r = new FileReader();
                r.onload = ev => {
                    document.getElementById('avatar').src = ev.target.result;
                };
                r.readAsDataURL(f);
            }
        });

        // --- 2. GESTIÓN MOCK DE EVENTO SUBMIT ---
        // Aborta la subida standard del form simulando éxito redireccionando a user-list.html
        document.getElementById('userForm').onsubmit = e => {
            e.preventDefault();
            location.href = 'user-list.html';
        };


        // --- 3. CARGA DE COMPONENTES DINÁMICOS ---
        loadComp(localStorage.getItem('isLoggedIn') ? '../headers/loged_header.html' : '../headers/unloged_header.html', 'navbar-placeholder', nav => {
            nav.querySelectorAll('a, form').forEach(el => {
                const a = el.tagName === 'FORM' ? 'action' : 'href', v = el.getAttribute(a);
                if (v?.startsWith('../') && !v.startsWith('http')) el.setAttribute(a, '../' + v);
            });
            const b = document.getElementById('btnAdminPanel');
            if (b) {
                b.href = 'admin-dashboard.html';
                b.classList.remove('d-none');
            }
        });
        loadComp('../footer.html', 'footer-placeholder');
    </script>
</body>

</html>
